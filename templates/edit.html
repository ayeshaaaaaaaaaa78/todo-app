<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>
    <h1>Edit Task</h1>

    <form action="/edit/{{ todo['id'] }}" method="POST">

    <a href="/" id="cancel-btn">Cancel</a>
